<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morkoç Ailesi Soyağacı</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f3ff; color: #1e1b4b; }
        .group:hover .group-hover\:opacity-100 { opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- SUPABASE BİLGİLERİNİZİ BURAYA YAZIN ---
        const SUPABASE_URL = "https://cqzzgiraaglehokkcxil.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_kaGxoYXoxvjQCP-1plOfkQ_o-EUIBxe";
        // -------------------------------------------

        const App = () => {
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [userRole, setUserRole] = useState('visitor'); 
            const [familyMembers, setFamilyMembers] = useState([]);
            const [loginData, setLoginData] = useState({ roleSelection: 'visitor', password: '' });
            const [modalMode, setModalMode] = useState(null); 
            const [activeMember, setActiveMember] = useState(null);
            const [formData, setFormData] = useState({ name: '', is_alive: 'Evet', gender: 'male', parents_info: '', photo: null });
            const [searchTerm, setSearchTerm] = useState('');
            const [errorMessage, setErrorMessage] = useState(null);
            const [highlightedId, setHighlightedId] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [draggedId, setDraggedId] = useState(null);
            
            const fileInputRef = useRef(null);

            useEffect(() => {
                const loadSupabase = () => {
                    const script = document.createElement('script');
                    script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
                    script.async = true;
                    script.onload = () => {
                        if (window.supabase) {
                            const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                            setSupabaseClient(client);
                        }
                    };
                    document.body.appendChild(script);
                };
                loadSupabase();
            }, []);

            useEffect(() => {
                if (supabaseClient) fetchMembers();
            }, [supabaseClient]);

            const fetchMembers = async () => {
                setIsLoading(true);
                const { data, error } = await supabaseClient.from('family_members').select('*').order('order', { ascending: true });
                if (!error) setFamilyMembers(data || []);
                setIsLoading(false);
                setTimeout(() => lucide.createIcons(), 200);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.roleSelection === 'admin' && loginData.password === '1234') {
                    setIsAuthenticated(true); setUserRole('admin'); setErrorMessage(null);
                } else if (loginData.roleSelection === 'visitor') {
                    setIsAuthenticated(true); setUserRole('visitor');
                } else {
                    setErrorMessage("Hatalı şifre!");
                }
                setTimeout(() => lucide.createIcons(), 200);
            };

            const saveMember = async (e) => {
                e.preventDefault();
                if (isSaving) return; // Çift kaydı engellemek için
                setIsSaving(true);
                try {
                    if (modalMode === 'edit') {
                        await supabaseClient.from('family_members').update(formData).eq('id', activeMember.id);
                    } else if (modalMode === 'add-child') {
                        const order = familyMembers.filter(m => m.parent_id === activeMember.id).length;
                        await supabaseClient.from('family_members').insert([{ ...formData, parent_id: activeMember.id, order }]);
                    } else if (modalMode === 'add-spouse') {
                        const { data: newSpouse } = await supabaseClient.from('family_members').insert([{ ...formData, spouse_id: activeMember.id }]).select().single();
                        await supabaseClient.from('family_members').update({ spouse_id: newSpouse.id }).eq('id', activeMember.id);
                    } else if (modalMode === 'add-root') {
                        await supabaseClient.from('family_members').insert([{ ...formData, order: familyMembers.length }]);
                    }
                    setModalMode(null);
                    await fetchMembers();
                } catch (err) { setErrorMessage("İşlem başarısız."); }
                finally { setIsSaving(false); }
            };

            const deleteMember = async (id) => {
                if (userRole !== 'admin') return;
                if (window.confirm("Bu üyeyi silmek istediğinize emin misiniz?")) {
                    const { error } = await supabaseClient.from('family_members').delete().eq('id', id);
                    if (!error) fetchMembers();
                }
            };

            // KRİTİK: Çift ağaç problemini çözen kök ayıklama mantığı
            const roots = useMemo(() => {
                const processedRootIds = new Set();
                return familyMembers.filter(m => {
                    if (m.parent_id) return false; // Ebeveyni olan kök olamaz
                    if (processedRootIds.has(m.id)) return false; // Zaten işlendiyse atla

                    if (m.spouse_id) {
                        const spouse = familyMembers.find(f => f.id === m.spouse_id);
                        // Eğer eşin ebeveyni varsa, kök o değildir, ebeveyni olan taraftan bağlanır
                        if (spouse && spouse.parent_id) return false;
                        // Eşlerin ikisinin de ebeveyni yoksa, sadece birini (ID'si küçük olanı) kök seç
                        if (spouse && !spouse.parent_id) {
                            processedRootIds.add(m.spouse_id);
                        }
                    }
                    return true;
                }).sort((a, b) => (a.order || 0) - (b.order || 0));
            }, [familyMembers]);

            const MemberCard = ({ member, role, onEdit, onAddChild, onAddSpouse, isSpouse, hasChildren }) => {
                const isAdmin = role === 'admin';
                const isFemale = member.gender === 'female';
                return (
                    <div className={`group relative p-3 rounded-xl shadow-sm border transition-all w-44 
                        ${isFemale ? 'bg-rose-50 border-rose-200' : 'bg-indigo-50 border-indigo-200'}
                        ${highlightedId === member.id ? 'ring-4 ring-purple-500 scale-105' : ''}`}>
                        
                        <div className="flex justify-between items-start mb-2">
                            <div className={`p-1.5 rounded-lg ${isFemale ? 'bg-rose-500' : 'bg-indigo-500'} text-white`}>
                                <i data-lucide="user" className="w-3.5 h-3.5"></i>
                            </div>
                            {isAdmin && (
                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onClick={onEdit} className="p-1 bg-white rounded border hover:text-purple-600"><i data-lucide="edit-2" className="w-3 h-3"></i></button>
                                    <button onClick={() => deleteMember(member.id)} className="p-1 bg-white rounded border hover:text-red-600"><i data-lucide="trash-2" className="w-3 h-3"></i></button>
                                </div>
                            )}
                        </div>
                        <h4 className="font-bold text-gray-800 truncate text-sm">{member.name}</h4>
                        <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full mt-1 inline-block ${member.is_alive === 'Evet' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'}`}>
                            {member.is_alive === 'Evet' ? 'HAYATTA' : 'VEFAT'}
                        </span>
                        {member.parents_info && <p className="text-[8px] text-gray-400 mt-1 italic truncate">Ailesi: {member.parents_info}</p>}
                        
                        {isAdmin && (
                            <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                {!member.spouse_id && <button onClick={onAddSpouse} className="p-1.5 bg-purple-500 text-white rounded-full shadow hover:scale-110"><i data-lucide="heart" className="w-3 h-3"></i></button>}
                                <button onClick={onAddChild} className="p-1.5 bg-indigo-500 text-white rounded-full shadow hover:scale-110"><i data-lucide="baby" className="w-3 h-3"></i></button>
                            </div>
                        )}
                    </div>
                );
            };

            const FamilyNode = ({ memberId, processedInTree = new Set() }) => {
                if (processedInTree.has(memberId)) return null;
                const member = familyMembers.find(m => m.id === memberId);
                if (!member) return null;
                processedInTree.add(memberId);

                const spouse = member.spouse_id ? familyMembers.find(f => f.id === member.spouse_id) : null;
                if (spouse) processedInTree.add(spouse.id);

                const children = familyMembers.filter(m => m.parent_id === member.id || (spouse && m.parent_id === spouse.id));

                return (
                    <div className="flex flex-col items-center">
                        <div className="flex items-center gap-1">
                            <MemberCard member={member} role={userRole} onEdit={() => openModal('edit', member)} onAddChild={() => openModal('add-child', member)} onAddSpouse={() => openModal('add-spouse', member)} hasChildren={children.length > 0} />
                            {spouse && (
                                <React.Fragment>
                                    <div className="w-8 h-px bg-purple-300 relative"><i data-lucide="heart" className="w-3 h-3 text-purple-400 absolute left-1/2 -translate-x-1/2 -top-1.5 fill-purple-400"></i></div>
                                    <MemberCard member={spouse} role={userRole} onEdit={() => openModal('edit', spouse)} onAddChild={() => openModal('add-child', spouse)} isSpouse hasChildren={children.length > 0} />
                                </React.Fragment>
                            )}
                        </div>
                        {children.length > 0 && (
                            <div className="flex flex-col items-center mt-10 relative">
                                <div className="w-px h-10 bg-gray-300"></div>
                                <div className="flex gap-10 pt-4 relative">
                                    {children.length > 1 && <div className="absolute top-0 left-1/2 -translate-x-1/2 h-px bg-gray-300" style={{width: 'calc(100% - 40px)'}}></div>}
                                    {children.map(child => (
                                        <div key={child.id} className="relative">
                                            <div className="absolute -top-4 left-1/2 w-px h-4 bg-gray-300"></div>
                                            <FamilyNode memberId={child.id} processedInTree={processedInTree} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const focusOnMember = (id) => {
                setSearchTerm(''); setHighlightedId(id);
                setTimeout(() => {
                    const el = document.querySelector(`[data-member-id="${id}"]`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
                setTimeout(() => setHighlightedId(null), 3000);
            };

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[#1e1b4b]">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                        <div className="bg-purple-600 p-10 text-center text-white">
                            <i data-lucide="tree-deciduous" className="w-16 h-16 mx-auto mb-4"></i>
                            <h2 className="text-3xl font-bold uppercase">Morkoç Ailesi</h2>
                            <p className="text-purple-100 text-xs mt-2 uppercase tracking-widest">Soyağacı Portalı</p>
                        </div>
                        <form onSubmit={handleLogin} className="p-8 space-y-6">
                            <select className="w-full p-4 rounded-xl border border-gray-200 outline-none font-bold text-gray-700 bg-gray-50"
                                value={loginData.roleSelection} onChange={e => setLoginData({...loginData, roleSelection: e.target.value})}>
                                <option value="visitor">Ziyaretçi (İzleme)</option>
                                <option value="admin">Yönetici (Tam Yetki)</option>
                            </select>
                            {loginData.roleSelection === 'admin' && <input type="password" placeholder="Şifre" required className="w-full p-4 rounded-xl border border-gray-200 outline-none" onChange={e => setLoginData({...loginData, password: e.target.value})} />}
                            <button type="submit" className="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700 transition-all uppercase">Aileyi Görüntüle</button>
                        </form>
                        {errorMessage && <p className="text-center pb-6 text-red-500 font-bold">{errorMessage}</p>}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-purple-600 p-2 rounded-lg text-white"><i data-lucide="tree-deciduous" className="w-5 h-5"></i></div>
                            <h1 className="font-bold text-gray-800 uppercase">Morkoç Ailesi</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="relative">
                                <input type="text" placeholder="İsimle ara..." className="pl-10 pr-4 py-2 bg-gray-100 rounded-full text-sm outline-none w-48 focus:w-64 transition-all" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                <i data-lucide="search" className="w-4 h-4 absolute left-3 top-2.5 text-gray-400"></i>
                                {searchSuggestions.length > 0 && (
                                    <div className="absolute top-12 right-0 w-64 bg-white border rounded-xl shadow-xl z-50 overflow-hidden">
                                        {searchSuggestions.map(m => <button key={m.id} onClick={() => focusOnMember(m.id)} className="w-full p-3 text-left hover:bg-purple-50 border-b last:border-0 font-bold text-sm text-gray-700">{m.name}</button>)}
                                    </div>
                                )}
                            </div>
                            <button onClick={() => setIsAuthenticated(false)} className="p-2 hover:bg-red-50 text-gray-400 hover:text-red-500 rounded-lg"><i data-lucide="log-out" className="w-5 h-5"></i></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-auto p-12 bg-white m-4 rounded-[2.5rem] shadow-inner border border-purple-100">
                        {familyMembers.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full text-center">
                                <i data-lucide="tree-deciduous" className="w-16 h-16 text-purple-200 mb-4"></i>
                                <h3 className="text-xl font-bold text-gray-400 uppercase">Soyağacı Boş</h3>
                                {userRole === 'admin' && <button onClick={() => openModal('add-root')} className="mt-4 bg-purple-600 text-white px-6 py-3 rounded-xl font-bold uppercase">İlk Atayı Ekle</button>}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center gap-24">
                                {roots.map(root => <FamilyNode key={root.id} memberId={root.id} />)}
                            </div>
                        )}
                    </main>

                    {modalMode && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
                                <div className="p-6 border-b flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold uppercase text-gray-800">{modalMode === 'edit' ? 'Düzenle' : 'Yeni Kayıt'}</h3>
                                    <button onClick={closeModal} className="text-gray-400 hover:text-gray-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={saveMember} className="p-6 space-y-4">
                                    <input type="text" placeholder="Adı Soyadı" required className="w-full p-3 border rounded-xl" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="p-3 border rounded-xl" value={formData.is_alive} onChange={e => setFormData({...formData, is_alive: e.target.value})}><option value="Evet">Hayatta</option><option value="Hayır">Vefat</option></select>
                                        <select className="p-3 border rounded-xl" value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})}><option value="male">Erkek</option><option value="female">Kadın</option></select>
                                    </div>
                                    <input type="text" placeholder="Kızlık Soyadı / Ailesi" className="w-full p-3 border rounded-xl" value={formData.parents_info} onChange={e => setFormData({...formData, parents_info: e.target.value})} />
                                    <button type="submit" disabled={isSaving} className="w-full bg-purple-600 text-white font-bold p-4 rounded-xl uppercase disabled:bg-gray-400">{isSaving ? "Kaydediliyor..." : "Kaydet"}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
