<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morkoç Ailesi Soyağacı</title>
    <!-- Kütüphaneler -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f3ff; color: #1e1b4b; overflow-x: hidden; }
        .scroll-smooth { scroll-behavior: smooth; }
        .group:hover .group-hover\:opacity-100 { opacity: 1; }
        .member-card { width: 11rem; flex-shrink: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- SUPABASE AYARLARI ---
        const SUPABASE_URL = "https://cqzzgiraaglehokkcxil.supabase.co"; // URL sonuna / eklemeyin
        const SUPABASE_ANON_KEY = "sb_publishable_kaGxoYXoxvjQCP-1plOfkQ_o-EUIBxe"; 
        // -------------------------

        const App = () => {
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [userRole, setUserRole] = useState('visitor'); 
            const [familyMembers, setFamilyMembers] = useState([]);
            const [loginData, setLoginData] = useState({ roleSelection: 'visitor', password: '' });
            const [modalMode, setModalMode] = useState(null); 
            const [activeMember, setActiveMember] = useState(null);
            const [formData, setFormData] = useState({ name: '', is_alive: 'Evet', gender: 'male', parents_info: '', photo: null });
            const [searchTerm, setSearchTerm] = useState('');
            const [errorMessage, setErrorMessage] = useState(null);
            const [highlightedId, setHighlightedId] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            
            const fileInputRef = useRef(null);

            // 1. Supabase Yükle
            useEffect(() => {
                const loadSupabase = () => {
                    const script = document.createElement('script');
                    script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
                    script.async = true;
                    script.onload = () => {
                        if (window.supabase) {
                            const client = window.supabase.createClient(SUPABASE_URL.trim(), SUPABASE_ANON_KEY.trim());
                            setSupabaseClient(client);
                        }
                    };
                    document.body.appendChild(script);
                };
                loadSupabase();
            }, []);

            // 2. Veri Çek ve Dinle
            const fetchMembers = async () => {
                if (!supabaseClient) return;
                setIsLoading(true);
                const { data, error } = await supabaseClient
                    .from('family_members')
                    .select('*')
                    .order('order', { ascending: true });

                if (error) setErrorMessage("Veri çekilemedi: " + error.message);
                else setFamilyMembers(data || []);
                setIsLoading(false);
                setTimeout(() => lucide.createIcons(), 300);
            };

            useEffect(() => {
                if (supabaseClient) {
                    fetchMembers();
                    const channel = supabaseClient.channel('realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'family_members' }, fetchMembers).subscribe();
                    return () => supabaseClient.removeChannel(channel);
                }
            }, [supabaseClient]);

            // 3. Giriş Kontrolü
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.roleSelection === 'admin') {
                    if (loginData.password === '1234') {
                        setUserRole('admin');
                        setIsAuthenticated(true);
                        setErrorMessage(null);
                    } else {
                        setErrorMessage("Hatalı yönetici şifresi!");
                    }
                } else {
                    setUserRole('visitor');
                    setIsAuthenticated(true);
                }
            };

            // 4. Kayıt Fonksiyonu
            const saveMember = async (e) => {
                e.preventDefault();
                if (isSaving || !supabaseClient) return;
                setIsSaving(true);
                try {
                    let result;
                    if (modalMode === 'edit') {
                        result = await supabaseClient.from('family_members').update(formData).eq('id', activeMember.id);
                    } else if (modalMode === 'add-child') {
                        result = await supabaseClient.from('family_members').insert([{ ...formData, parent_id: activeMember.id }]);
                    } else if (modalMode === 'add-spouse') {
                        const { data: newSpouse } = await supabaseClient.from('family_members').insert([{ ...formData, spouse_id: activeMember.id }]).select().single();
                        result = await supabaseClient.from('family_members').update({ spouse_id: newSpouse.id }).eq('id', activeMember.id);
                    } else if (modalMode === 'add-root') {
                        result = await supabaseClient.from('family_members').insert([{ ...formData }]);
                    }
                    if (result?.error) throw result.error;
                    setModalMode(null);
                    fetchMembers();
                } catch (err) { alert("Kaydedilemedi: " + err.message); }
                finally { setIsSaving(false); }
            };

            // 5. Kök (Root) Ayıklama Mantığı (Çift Ağaç Fix)
            const roots = useMemo(() => {
                const processed = new Set();
                return familyMembers.filter(m => {
                    if (m.parent_id) return false;
                    if (processed.has(m.id)) return false;
                    if (m.spouse_id) {
                        const spouse = familyMembers.find(f => f.id === m.spouse_id);
                        if (spouse && spouse.parent_id) return false;
                        if (spouse) processed.add(spouse.id);
                    }
                    return true;
                });
            }, [familyMembers]);

            const MemberCard = ({ member, role, onEdit, onAddChild, onAddSpouse, hasChildren }) => {
                const isAdmin = role === 'admin';
                const isFemale = member.gender === 'female';
                return (
                    <div className={`group relative p-3 rounded-xl border member-card shadow-sm transition-all
                        ${isFemale ? 'bg-rose-50 border-rose-200' : 'bg-indigo-50 border-indigo-200'}
                        ${highlightedId === member.id ? 'ring-4 ring-purple-500 scale-105 z-50' : ''}`}>
                        <div className="flex justify-between items-start mb-2">
                            <div className={`p-1.5 rounded-lg ${isFemale ? 'bg-rose-500' : 'bg-indigo-500'} text-white`}>
                                <i data-lucide="user" className="w-4 h-4"></i>
                            </div>
                            {isAdmin && (
                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onClick={onEdit} className="p-1 bg-white rounded border hover:text-purple-600"><i data-lucide="edit-2" className="w-3 h-3"></i></button>
                                    <button onClick={async () => { if(confirm("Silinsin mi?")) { await supabaseClient.from('family_members').delete().eq('id', member.id); fetchMembers(); } }} className="p-1 bg-white rounded border hover:text-red-600"><i data-lucide="trash-2" className="w-3 h-3"></i></button>
                                </div>
                            )}
                        </div>
                        <h4 className="font-bold text-gray-800 text-sm truncate">{member.name}</h4>
                        <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full mt-1 inline-block ${member.is_alive === 'Evet' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'}`}>
                            {member.is_alive === 'Evet' ? 'HAYATTA' : 'VEFAT'}
                        </span>
                        {member.parents_info && <p className="text-[8px] text-gray-400 mt-1 italic truncate">Ailesi: {member.parents_info}</p>}
                        {isAdmin && (
                            <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 flex gap-1 opacity-0 group-hover:opacity-100">
                                {!member.spouse_id && <button onClick={onAddSpouse} className="p-1.5 bg-purple-500 text-white rounded-full shadow"><i data-lucide="heart" className="w-3 h-3"></i></button>}
                                <button onClick={onAddChild} className="p-1.5 bg-indigo-500 text-white rounded-full shadow"><i data-lucide="baby" className="w-3 h-3"></i></button>
                            </div>
                        )}
                    </div>
                );
            };

            const FamilyNode = ({ memberId, processed = new Set() }) => {
                if (processed.has(memberId)) return null;
                const member = familyMembers.find(m => m.id === memberId);
                if (!member) return null;
                processed.add(memberId);

                const spouse = member.spouse_id ? familyMembers.find(f => f.id === member.spouse_id) : null;
                if (spouse) processed.add(spouse.id);

                const children = familyMembers.filter(m => m.parent_id === member.id || (spouse && m.parent_id === spouse.id));

                return (
                    <div className="flex flex-col items-center">
                        <div className="flex items-center gap-2">
                            <MemberCard member={member} role={userRole} onEdit={() => openModal('edit', member)} onAddChild={() => openModal('add-child', member)} onAddSpouse={() => openModal('add-spouse', member)} hasChildren={children.length > 0} />
                            {spouse && (
                                <React.Fragment>
                                    <div className="w-6 h-px bg-purple-300 relative"><i data-lucide="heart" className="w-3 h-3 text-purple-400 absolute left-1/2 -translate-x-1/2 -top-1.5 fill-purple-400"></i></div>
                                    <MemberCard member={spouse} role={userRole} onEdit={() => openModal('edit', spouse)} onAddChild={() => openModal('add-child', spouse)} hasChildren={children.length > 0} />
                                </React.Fragment>
                            )}
                        </div>
                        {children.length > 0 && (
                            <div className="flex flex-col items-center mt-8 relative">
                                <div className="w-px h-8 bg-gray-300"></div>
                                <div className="flex gap-8 pt-4 relative">
                                    {children.length > 1 && <div className="absolute top-0 left-1/2 -translate-x-1/2 h-px bg-gray-300" style={{width: 'calc(100% - 3rem)'}}></div>}
                                    {children.map(child => (
                                        <div key={child.id} className="relative">
                                            <div className="absolute -top-4 left-1/2 w-px h-4 bg-gray-300"></div>
                                            <FamilyNode memberId={child.id} processed={processed} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const openModal = (mode, member = null) => {
                setModalMode(mode); setActiveMember(member);
                if (mode === 'edit' && member) setFormData({ name: member.name, is_alive: member.is_alive, gender: member.gender, parents_info: member.parents_info || '', photo: member.photo });
                else setFormData({ name: '', is_alive: 'Evet', gender: 'male', parents_info: '', photo: null });
                setTimeout(() => lucide.createIcons(), 100);
            };

            if (!isAuthenticated) return (
                <div className="min-h-screen bg-[#1e1b4b] flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
                        <div className="bg-purple-600 p-8 text-center text-white">
                            <i data-lucide="tree-deciduous" className="w-12 h-12 mx-auto mb-4"></i>
                            <h2 className="text-2xl font-bold uppercase">Morkoç Ailesi</h2>
                            <p className="text-purple-100 text-[10px] mt-1 uppercase tracking-widest">Soyağacı Portalı</p>
                        </div>
                        <form onSubmit={handleLogin} className="p-6 space-y-4 text-gray-700">
                            <select className="w-full p-3 rounded-xl border bg-gray-50 font-bold" value={loginData.roleSelection} onChange={e => setLoginData({...loginData, roleSelection: e.target.value})}>
                                <option value="visitor">Ziyaretçi (İzleme)</option>
                                <option value="admin">Yönetici (Tam Yetki)</option>
                            </select>
                            {loginData.roleSelection === 'admin' && <input type="password" placeholder="Şifre" required className="w-full p-3 rounded-xl border" onChange={e => setLoginData({...loginData, password: e.target.value})} />}
                            <button type="submit" className="w-full bg-purple-600 text-white font-bold py-3 rounded-xl uppercase">Aileyi Görüntüle</button>
                        </form>
                        {errorMessage && <p className="text-center pb-4 text-red-500 text-xs font-bold">{errorMessage}</p>}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="h-14 bg-white border-b flex items-center justify-between px-6 shadow-sm shrink-0">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-1.5 rounded-lg text-white"><i data-lucide="tree-deciduous" className="w-4 h-4"></i></div>
                            <h1 className="font-bold text-sm uppercase">Morkoç Ailesi Soyağacı</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsAuthenticated(false)} className="p-2 text-gray-400 hover:text-red-500"><i data-lucide="log-out" className="w-4 h-4"></i></button>
                        </div>
                    </header>
                    <main className="flex-1 overflow-auto p-12">
                        {familyMembers.length === 0 && !isLoading ? (
                            <div className="bg-white p-12 rounded-[2rem] shadow-sm border border-purple-100 text-center max-w-sm mx-auto mt-20">
                                <i data-lucide="tree-deciduous" className="w-12 h-12 text-purple-200 mx-auto mb-4"></i>
                                <h3 className="font-bold text-gray-800 uppercase">Soyağacı Boş</h3>
                                {userRole === 'admin' ? (
                                    <button onClick={() => openModal('add-root')} className="mt-4 bg-purple-600 text-white px-6 py-3 rounded-xl font-bold uppercase">İlk Atayı Ekle</button>
                                ) : <p className="text-xs text-gray-400 mt-2">Henüz kayıt eklenmemiş.</p>}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center gap-20">
                                {roots.map(root => <FamilyNode key={root.id} memberId={root.id} />)}
                            </div>
                        )}
                    </main>
                    {modalMode && (
                        <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-xs overflow-hidden text-gray-700">
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold uppercase text-sm">Üye İşlemi</h3>
                                    <button onClick={closeModal}><i data-lucide="x" className="w-4 h-4"></i></button>
                                </div>
                                <form onSubmit={saveMember} className="p-4 space-y-3">
                                    <input placeholder="Adı Soyadı" required className="w-full p-2.5 border rounded-lg text-sm" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="p-2 border rounded-lg text-xs" value={formData.is_alive} onChange={e => setFormData({...formData, is_alive: e.target.value})}><option value="Evet">Hayatta</option><option value="Hayır">Vefat</option></select>
                                        <select className="p-2 border rounded-lg text-xs" value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})}><option value="male">Erkek</option><option value="female">Kadın</option></select>
                                    </div>
                                    <input placeholder="Kızlık Soyadı / Ailesi" className="w-full p-2.5 border rounded-lg text-sm" value={formData.parents_info} onChange={e => setFormData({...formData, parents_info: e.target.value})} />
                                    <button type="submit" disabled={isSaving} className="w-full bg-purple-600 text-white font-bold py-3 rounded-lg text-sm uppercase">{isSaving ? "Kaydediliyor..." : "Kaydet"}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
