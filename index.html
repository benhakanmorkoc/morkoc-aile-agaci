<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morkoç Ailesi Soyağacı</title>
    <!-- Gerekli Kütüphaneler -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f3ff; }
        .scroll-smooth { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- BURAYA KENDİ BİLGİLERİNİZİ YAZIN ---
        const SUPABASE_URL = "https://cqzzgiraaglehokkcxil.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "sb_publishable_kaGxoYXoxvjQCP-1plOfkQ_o-EUIBxe";
        // ----------------------------------------

        const App = () => {
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [userRole, setUserRole] = useState('visitor');
            const [familyMembers, setFamilyMembers] = useState([]);
            const [loginData, setLoginData] = useState({ roleSelection: 'visitor', password: '' });
            const [modalMode, setModalMode] = useState(null);
            const [activeMember, setActiveMember] = useState(null);
            const [formData, setFormData] = useState({ name: '', is_alive: 'Evet', gender: 'male', parents_info: '', photo: null });
            const [searchTerm, setSearchTerm] = useState('');
            const [errorMessage, setErrorMessage] = useState(null);
            const [highlightedId, setHighlightedId] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            // Supabase Kütüphanesini Yükle
            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
                script.onload = () => {
                    if (window.supabase) {
                        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        setSupabaseClient(client);
                    }
                };
                document.body.appendChild(script);
            }, []);

            useEffect(() => {
                if (supabaseClient) fetchMembers();
            }, [supabaseClient]);

            const fetchMembers = async () => {
                setIsLoading(true);
                const { data, error } = await supabaseClient.from('family_members').select('*').order('order', { ascending: true });
                if (!error) setFamilyMembers(data || []);
                setIsLoading(false);
                setTimeout(() => lucide.createIcons(), 500);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.roleSelection === 'admin') {
                    if (loginData.password === '1234') {
                        setIsAuthenticated(true);
                        setUserRole('admin');
                    } else {
                        setErrorMessage("Hatalı şifre!");
                    }
                } else {
                    setIsAuthenticated(true);
                    setUserRole('visitor');
                }
            };

            const roots = useMemo(() => {
                return familyMembers.filter(m => !m.parent_id);
            }, [familyMembers]);

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[#1e1b4b]">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                        <div className="bg-purple-600 p-10 text-center text-white">
                            <div className="flex justify-center mb-4"><i data-lucide="tree-deciduous" className="w-16 h-16 text-white"></i></div>
                            <h2 className="text-3xl font-bold uppercase">Morkoç Ailesi</h2>
                        </div>
                        <form onSubmit={handleLogin} className="p-8 space-y-6">
                            <select className="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none font-bold text-gray-700"
                                value={loginData.roleSelection} onChange={e => setLoginData({...loginData, roleSelection: e.target.value})}>
                                <option value="visitor">Ziyaretçi (İzleme)</option>
                                <option value="admin">Yönetici (Tam Yetki)</option>
                            </select>
                            {loginData.roleSelection === 'admin' && (
                                <input type="password" placeholder="Şifre" required className="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" 
                                    onChange={e => setLoginData({...loginData, password: e.target.value})} />
                            )}
                            <button type="submit" className="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700 transition-all uppercase">Aileyi Görüntüle</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-2 rounded text-white"><i data-lucide="tree-deciduous" className="w-5 h-5"></i></div>
                            <h1 className="font-bold text-gray-800 uppercase">Morkoç Ailesi Soyağacı</h1>
                        </div>
                        <button onClick={() => setIsAuthenticated(false)} className="text-gray-400 hover:text-red-500 transition-colors">
                            <i data-lucide="log-out"></i>
                        </button>
                    </header>
                    <main className="flex-1 overflow-auto p-10 text-center">
                        {familyMembers.length === 0 ? (
                             <div className="bg-white p-10 rounded-2xl shadow max-w-md mx-auto mt-20">
                                <p className="text-xl font-bold text-gray-600 mb-4 uppercase tracking-tight">Soyağacı Henüz Boş</p>
                                <p className="text-sm text-gray-400">Yönetici girişi yaparak ilk üyeyi ekleyin.</p>
                             </div>
                        ) : (
                            <div className="flex flex-col items-center space-y-20 py-10">
                                {roots.map(root => (
                                    <div key={root.id} className="p-6 bg-white rounded-xl shadow-md border-t-4 border-purple-500 w-48">
                                        <p className="font-bold text-gray-800">{root.name}</p>
                                        <span className="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold uppercase mt-2 inline-block">HAYATTA</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
