<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morkoç Ailesi Soyağacı</title>

    <!-- Gerekli Kütüphaneler -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f3ff;
            color: #1e1b4b;
            overflow-x: hidden;
        }
        .scroll-smooth {
            scroll-behavior: smooth;
        }
        .group:hover .group-hover\:opacity-100 {
            opacity: 1 !important;
            visibility: visible !important;
        }

        /* Sürükleme görseli */
        .dragging-card {
            opacity: 0.4;
            transform: scale(0.96);
        }
        .drop-target {
            outline: 3px dashed #a855f7;
            outline-offset: 4px;
        }

        /* Fotoğraf hover yakınlaştırma efekti */
        .photo-zoom-wrap {
            transition: transform 0.3s ease, box-shadow 0.3s ease, z-index 0s linear 0.3s;
        }
        .photo-zoom-wrap:hover {
            transform: scale(2.4);
            z-index: 60;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease, z-index 0s linear 0s;
        }

        /* Pan & Zoom kutusu */
        .pan-zoom-viewport {
            position: relative;
            overflow: hidden;
            cursor: grab;
            touch-action: none;
            user-select: none;
            background-image:
                radial-gradient(circle, rgba(168, 85, 247, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .pan-zoom-viewport.is-panning {
            cursor: grabbing;
        }
        .pan-zoom-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* Zoom kontrolleri her zaman ekran sağ-altta */
        .zoom-controls {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 90;
        }
        .zoom-controls button {
            transition: all 0.15s ease;
            touch-action: manipulation;
        }
        .zoom-controls button:hover {
            transform: translateY(-1px);
        }
        @media (min-width: 640px) {
            .zoom-controls { right: 24px; bottom: 24px; }
        }

        /* Mobilde hover ile yakınlaştırma yerine basılı tutma davranışı */
        @media (hover: none) {
            .photo-zoom-wrap:hover { transform: none; box-shadow: none; z-index: auto; }
            .photo-zoom-wrap:active {
                transform: scale(2.2);
                z-index: 60;
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            }
        }

        /* Eş çifti çerçevesi */
        .couple-frame {
            position: relative;
            padding: 10px 14px;
            border-radius: 22px;
            border: 1.5px solid #d8b4fe;
            background: linear-gradient(180deg, rgba(243, 232, 255, 0.55), rgba(255, 255, 255, 0.4));
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.08);
        }

        /* Bağlantı çizgileri (eş + çocuk) */
        .link-line {
            background-color: #a855f7;
        }
        .link-vertical {
            width: 3px;
            background-color: #a855f7;
            border-radius: 2px;
        }
        .link-horizontal {
            height: 3px;
            background-color: #a855f7;
            border-radius: 2px;
        }
        .link-spouse {
            height: 3px;
            background-color: #a855f7;
            border-radius: 2px;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // =========================================================
        // AŞAĞIDAKİ 2 SATIRI KENDİ SUPABASE BİLGİLERİNİZLE DEĞİŞTİRİN
        const SUPABASE_URL = "https://cqzzgiraaglehokkcxil.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_kaGxoYXoxvjQCP-1plOfkQ_o-EUIBxe";
        // =========================================================

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                tree: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13.5 22c-.67 0-1.5-.2-2-.5V16H8l4-8h-2l4-8 4 8h-2l4 8h-3.5v5.5c-.5.3-1.33.5-2 .5Z"/></svg>,
                user: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                edit: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
                trash: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
                heart: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
                baby: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="5" r="3"/><path d="M12 22V8"/><path d="M5 11l7-3 7 3"/><path d="M5 22l7-6 7 6"/></svg>,
                search: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                logout: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
                x: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                camera: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
                eye: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
                plus: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                drag: <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [userRole, setUserRole] = useState('visitor');
            const [familyMembers, setFamilyMembers] = useState([]);
            const [loginData, setLoginData] = useState({ roleSelection: 'visitor', password: '' });
            const [modalMode, setModalMode] = useState(null);
            const [activeMember, setActiveMember] = useState(null);
            const [formData, setFormData] = useState({ name: '', is_alive: 'Evet', gender: 'male', parents_info: '', photo: null });
            const [searchTerm, setSearchTerm] = useState('');
            const [errorMessage, setErrorMessage] = useState(null);
            const [highlightedId, setHighlightedId] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [draggedId, setDraggedId] = useState(null);
            const [dragOverId, setDragOverId] = useState(null);

            // Pan & Zoom state
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [isPanning, setIsPanning] = useState(false);
            const panStartRef = useRef({ x: 0, y: 0, panX: 0, panY: 0 });
            const touchStateRef = useRef({
                mode: null, startX: 0, startY: 0,
                startPanX: 0, startPanY: 0,
                startDistance: 0, startZoom: 1,
                startMidX: 0, startMidY: 0
            });

            // Touch handler içinde güncel pan/zoom değerlerine ref üzerinden ulaşmak için
            const panRef  = useRef(pan);
            const zoomRef = useRef(zoom);
            useEffect(() => { panRef.current = pan; }, [pan]);
            useEffect(() => { zoomRef.current = zoom; }, [zoom]);

            const fileInputRef = useRef(null);
            const viewportRef = useRef(null);
            const canvasRef = useRef(null);

            // 1) Supabase Kurulumu
            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
                script.onload = () => {
                    if (window.supabase) {
                        const client = window.supabase.createClient(SUPABASE_URL.trim(), SUPABASE_ANON_KEY.trim());
                        setSupabaseClient(client);
                    }
                };
                document.body.appendChild(script);
            }, []);

            // 2) Verileri çek
            const fetchMembers = async () => {
                if (!supabaseClient) return;

                setIsLoading(true);

                const { data, error } = await supabaseClient
                    .from('family_members')
                    .select('*')
                    .order('order', { ascending: true });

                if (error) {
                    console.error("Veri çekme hatası:", error);
                    alert("Veriler çekilemedi: " + error.message);
                    setFamilyMembers([]);
                } else {
                    setFamilyMembers(data || []);
                }

                setIsLoading(false);
            };

            useEffect(() => {
                if (!supabaseClient) return;
                fetchMembers();
                const channel = supabaseClient
                    .channel('realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'family_members' }, fetchMembers)
                    .subscribe();

                return () => supabaseClient.removeChannel(channel);
            }, [supabaseClient]);

            // 3) Sistem girişi
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.roleSelection === 'admin') {
                    if (loginData.password === '1234') {
                        setUserRole('admin');
                        setIsAuthenticated(true);
                        setErrorMessage(null);
                    } else {
                        setErrorMessage("Hatalı yönetici şifresi!");
                    }
                } else {
                    setUserRole('visitor');
                    setIsAuthenticated(true);
                    setErrorMessage(null);
                }
            };

            const searchSuggestions = useMemo(() => {
                const q = searchTerm.trim().toLowerCase();
                if (!q) return [];
                return familyMembers
                    .filter(m => (m.name || '').toLowerCase().includes(q))
                    .slice(0, 8);
            }, [searchTerm, familyMembers]);

            const closeModal = () => {
                setModalMode(null);
                setActiveMember(null);
                setFormData({ name: '', is_alive: 'Evet', gender: 'male', parents_info: '', photo: null });
            };

            // 4) Kayıt & güncelleme
            const saveMember = async (e) => {
                e.preventDefault();
                if (isSaving || !supabaseClient) return;

                setIsSaving(true);

                try {
                    let result;

                    if (modalMode === 'edit') {
                        result = await supabaseClient
                            .from('family_members')
                            .update(formData)
                            .eq('id', activeMember.id)
                            .select();

                    } else if (modalMode === 'add-child') {
                        // Çocuk eklerken: hem aktif kişinin hem de eşinin çocuklarını birlikte say
                        const spouseId = activeMember.spouse_id || null;
                        const siblingCount = familyMembers.filter(m =>
                            m.parent_id === activeMember.id ||
                            (spouseId && m.parent_id === spouseId)
                        ).length;

                        result = await supabaseClient
                            .from('family_members')
                            .insert([{ ...formData, parent_id: activeMember.id, order: siblingCount }])
                            .select();

                    } else if (modalMode === 'add-spouse') {
                        const { data: newSpouse, error } = await supabaseClient
                            .from('family_members')
                            .insert([{ ...formData, spouse_id: activeMember.id }])
                            .select()
                            .single();

                        if (error) throw error;

                        result = await supabaseClient
                            .from('family_members')
                            .update({ spouse_id: newSpouse.id })
                            .eq('id', activeMember.id)
                            .select();

                    } else if (modalMode === 'add-root') {
                        result = await supabaseClient
                            .from('family_members')
                            .insert([{ ...formData, parent_id: null, spouse_id: null, order: familyMembers.length }])
                            .select();
                    }

                    if (result?.error) {
                        throw result.error;
                    }

                    closeModal();
                    await fetchMembers();

                } catch (err) {
                    alert("Kayıt sırasında hata oluştu: " + err.message);
                    console.error("Supabase kayıt hatası:", err);
                } finally {
                    setIsSaving(false);
                }
            };

            const deleteMember = async (id) => {
                if (userRole !== 'admin') return;
                const hasChildren = familyMembers.some(m => m.parent_id === id);

                if (hasChildren) {
                    alert("Bu kişinin çocukları var! Önce çocuklarını silmelisiniz.");
                    return;
                }

                if (confirm("Silmek istediğinize emin misiniz?")) {
                    await supabaseClient.from('family_members').delete().eq('id', id);
                    fetchMembers();
                }
            };

            // 5) Fotoğraf
            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 800 * 1024) {
                    alert("Fotoğraf maks 800KB olmalıdır.");
                    return;
                }

                const reader = new FileReader();
                reader.onloadend = () => setFormData(prev => ({ ...prev, photo: reader.result }));
                reader.readAsDataURL(file);
            };

            // 6) Sürükle bırak
            const handleDragStart = (e, id) => {
                if (userRole !== 'admin') return;
                setDraggedId(id);
                if (e.dataTransfer) {
                    e.dataTransfer.effectAllowed = "move";
                    try { e.dataTransfer.setData("text/plain", id); } catch (_) {}
                }
            };

            const handleDragEnd = () => {
                setDraggedId(null);
                setDragOverId(null);
            };

            const handleDragOver = (e, id) => {
                if (userRole !== 'admin' || !draggedId || draggedId === id) return;
                e.preventDefault();
                if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
                if (dragOverId !== id) setDragOverId(id);
            };

            const handleDragLeave = (id) => {
                if (dragOverId === id) setDragOverId(null);
            };

            const handleDrop = async (targetId) => {
                setDragOverId(null);
                if (!draggedId || draggedId === targetId || userRole !== 'admin') {
                    setDraggedId(null);
                    return;
                }

                const draggedM = familyMembers.find(m => m.id === draggedId);
                const targetM = familyMembers.find(m => m.id === targetId);
                if (!draggedM || !targetM) {
                    setDraggedId(null);
                    return;
                }

                try {
                    // Yardımcı: iki kişinin görsel olarak kardeş olup olmadığını döner.
                    // (aynı parent_id veya parent_id'leri birbirinin eşi olanlar da kardeştir)
                    const areSiblings = (a, b) => {
                        if (!a.parent_id || !b.parent_id) return false;
                        if (a.parent_id === b.parent_id) return true;
                        const pa = familyMembers.find(m => m.id === a.parent_id);
                        const pb = familyMembers.find(m => m.id === b.parent_id);
                        if (!pa || !pb) return false;
                        return pa.spouse_id === pb.id || pb.spouse_id === pa.id;
                    };

                    // 1) Kardeşler -> sıralamayı değiştir
                    if (areSiblings(draggedM, targetM)) {
                        await supabaseClient.from('family_members').update({ order: targetM.order }).eq('id', draggedM.id);
                        await supabaseClient.from('family_members').update({ order: draggedM.order }).eq('id', targetM.id);
                    }
                    // 2) Eşler -> sağ/sol yer değişir (mevcut davranış korundu)
                    else if (draggedM.spouse_id === targetM.id || targetM.spouse_id === draggedM.id) {
                        const anchor = draggedM.parent_id ? draggedM : targetM;
                        const spouse = anchor.id === draggedM.id ? targetM : draggedM;

                        await supabaseClient.from('family_members').update({ parent_id: anchor.parent_id, order: anchor.order }).eq('id', spouse.id);
                        await supabaseClient.from('family_members').update({ parent_id: null, order: 0 }).eq('id', anchor.id);

                        const children = familyMembers.filter(m => m.parent_id === anchor.id);
                        for (const child of children) {
                            await supabaseClient.from('family_members').update({ parent_id: spouse.id }).eq('id', child.id);
                        }
                    }
                    // 3) Aynı seviyedeki kök kişiler -> kökler arası sıralama
                    else if (!draggedM.parent_id && !targetM.parent_id) {
                        await supabaseClient.from('family_members').update({ order: targetM.order }).eq('id', draggedM.id);
                        await supabaseClient.from('family_members').update({ order: draggedM.order }).eq('id', targetM.id);
                    } else {
                        alert("Bu iki kart birbirinin yerine geçemez. Sadece kardeşler, eşler veya aynı seviyedeki kökler yer değiştirebilir.");
                    }
                } catch (err) {
                    console.error("Sürükle-bırak hatası:", err);
                    alert("Yer değiştirme sırasında hata: " + err.message);
                }

                setDraggedId(null);
                fetchMembers();
            };

            // 7) Ağaç yapısı
            const roots = useMemo(() => {
                const processed = new Set();
                return familyMembers
                    .filter(m => {
                        if (m.parent_id) return false;
                        if (processed.has(m.id)) return false;

                        if (m.spouse_id) {
                            const spouse = familyMembers.find(f => f.id === m.spouse_id);
                            if (spouse && spouse.parent_id) return false;
                            if (spouse) processed.add(spouse.id);
                        }
                        return true;
                    })
                    .sort((a, b) => (a.order || 0) - (b.order || 0));
            }, [familyMembers]);

            const openModal = (mode, member = null) => {
                setModalMode(mode);
                setActiveMember(member);

                if (mode === 'edit' && member) {
                    setFormData({
                        name: member.name || '',
                        is_alive: member.is_alive || 'Evet',
                        gender: member.gender || 'male',
                        parents_info: member.parents_info || '',
                        photo: member.photo || null
                    });
                } else {
                    setFormData({ name: '', is_alive: 'Evet', gender: 'male', parents_info: '', photo: null });
                }
            };

            // Pan & Zoom işlemleri
            const ZOOM_MIN = 0.3;
            const ZOOM_MAX = 2.5;
            const ZOOM_STEP = 0.15;

            const clampZoom = (z) => Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));

            const zoomIn  = () => setZoom(z => clampZoom(z + ZOOM_STEP));
            const zoomOut = () => setZoom(z => clampZoom(z - ZOOM_STEP));
            const resetView = () => { setZoom(1); setPan({ x: 0, y: 0 }); };

            const handleViewportWheel = (e) => {
                e.preventDefault();
                const direction = e.deltaY > 0 ? -1 : 1;
                const factor = 1 + direction * 0.1;

                const rect = viewportRef.current?.getBoundingClientRect();
                if (!rect) return;

                const cx = rect.width / 2;
                const cy = rect.height / 2;
                const mouseX = e.clientX - rect.left - cx;
                const mouseY = e.clientY - rect.top  - cy;

                setZoom(prevZoom => {
                    const nextZoom = clampZoom(prevZoom * factor);
                    if (nextZoom === prevZoom) return prevZoom;

                    const realFactor = nextZoom / prevZoom;
                    setPan(prev => ({
                        x: mouseX - (mouseX - prev.x) * realFactor,
                        y: mouseY - (mouseY - prev.y) * realFactor
                    }));
                    return nextZoom;
                });
            };

            const handleViewportMouseDown = (e) => {
                if (e.button !== 0) return;
                if (e.target.closest('[data-member-id]')) return;
                if (e.target.closest('.zoom-controls')) return;

                setIsPanning(true);
                liveRef.current.x = panRef.current.x;
                liveRef.current.y = panRef.current.y;
                liveRef.current.z = zoomRef.current;
                panStartRef.current = {
                    x: e.clientX,
                    y: e.clientY,
                    panX: liveRef.current.x,
                    panY: liveRef.current.y
                };
            };

            const handleViewportMouseMove = (e) => {
                if (!isPanning) return;
                liveRef.current.x = panStartRef.current.panX + (e.clientX - panStartRef.current.x);
                liveRef.current.y = panStartRef.current.panY + (e.clientY - panStartRef.current.y);
                scheduleTransform();
            };

            const stopPanning = () => {
                if (isPanning) {
                    setPan({ x: liveRef.current.x, y: liveRef.current.y });
                }
                setIsPanning(false);
            };

            // Mobil dokunmatik (1 parmak pan, 2 parmak pinch zoom)
            // Performans için transform doğrudan DOM'a yazılır, state sadece touchend'de güncellenir.
            const getDistance = (t1, t2) => {
                const dx = t1.clientX - t2.clientX;
                const dy = t1.clientY - t2.clientY;
                return Math.sqrt(dx * dx + dy * dy);
            };

            const liveRef = useRef({ x: 0, y: 0, z: 1 });
            const rafRef  = useRef(null);

            const applyTransform = () => {
                rafRef.current = null;
                const c = canvasRef.current;
                if (!c) return;
                const { x, y, z } = liveRef.current;
                c.style.transform = `translate(calc(-50% + ${x}px), ${y}px) scale(${z})`;
            };

            const scheduleTransform = () => {
                if (rafRef.current != null) return;
                rafRef.current = requestAnimationFrame(applyTransform);
            };

            useEffect(() => {
                const el = viewportRef.current;
                if (!el) return;

                const onTouchStart = (e) => {
                    const target = e.target;
                    if (target.closest && (target.closest('[data-member-id]') || target.closest('.zoom-controls'))) {
                        if (e.touches.length < 2) return;
                    }

                    // O anki canlı pan/zoom değerlerini al
                    liveRef.current.x = panRef.current.x;
                    liveRef.current.y = panRef.current.y;
                    liveRef.current.z = zoomRef.current;

                    if (e.touches.length === 1) {
                        const t = e.touches[0];
                        touchStateRef.current = {
                            mode: 'pan',
                            startX: t.clientX,
                            startY: t.clientY,
                            startPanX: liveRef.current.x,
                            startPanY: liveRef.current.y,
                            startDistance: 0,
                            startZoom: liveRef.current.z,
                            startMidX: 0,
                            startMidY: 0
                        };
                    } else if (e.touches.length === 2) {
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        const rect = el.getBoundingClientRect();
                        const midX = (t1.clientX + t2.clientX) / 2 - rect.left - rect.width / 2;
                        const midY = (t1.clientY + t2.clientY) / 2 - rect.top  - rect.height / 2;
                        touchStateRef.current = {
                            mode: 'pinch',
                            startX: 0, startY: 0,
                            startPanX: liveRef.current.x,
                            startPanY: liveRef.current.y,
                            startDistance: getDistance(t1, t2),
                            startZoom: liveRef.current.z,
                            startMidX: midX,
                            startMidY: midY
                        };
                    }
                };

                const onTouchMove = (e) => {
                    const state = touchStateRef.current;
                    if (!state.mode) return;

                    if (state.mode === 'pan' && e.touches.length === 1) {
                        e.preventDefault();
                        const t = e.touches[0];
                        liveRef.current.x = state.startPanX + (t.clientX - state.startX);
                        liveRef.current.y = state.startPanY + (t.clientY - state.startY);
                        scheduleTransform();
                    } else if (state.mode === 'pinch' && e.touches.length === 2) {
                        e.preventDefault();
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        const distance = getDistance(t1, t2);
                        const factor = distance / (state.startDistance || 1);
                        const nextZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, state.startZoom * factor));
                        const realFactor = nextZoom / state.startZoom;

                        liveRef.current.z = nextZoom;
                        liveRef.current.x = state.startMidX - (state.startMidX - state.startPanX) * realFactor;
                        liveRef.current.y = state.startMidY - (state.startMidY - state.startPanY) * realFactor;
                        scheduleTransform();
                    }
                };

                const syncStateFromLive = () => {
                    setPan({ x: liveRef.current.x, y: liveRef.current.y });
                    setZoom(liveRef.current.z);
                };

                const onTouchEnd = (e) => {
                    if (e.touches.length === 0) {
                        if (touchStateRef.current.mode) {
                            syncStateFromLive();
                        }
                        touchStateRef.current.mode = null;
                    } else if (e.touches.length === 1) {
                        const t = e.touches[0];
                        touchStateRef.current = {
                            mode: 'pan',
                            startX: t.clientX,
                            startY: t.clientY,
                            startPanX: liveRef.current.x,
                            startPanY: liveRef.current.y,
                            startDistance: 0,
                            startZoom: liveRef.current.z,
                            startMidX: 0,
                            startMidY: 0
                        };
                    }
                };

                el.addEventListener('touchstart', onTouchStart, { passive: true });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd, { passive: true });
                el.addEventListener('touchcancel', onTouchEnd, { passive: true });

                return () => {
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                    el.removeEventListener('touchcancel', onTouchEnd);
                    if (rafRef.current != null) cancelAnimationFrame(rafRef.current);
                };
            }, [isAuthenticated]);

            const focusOnMember = (id) => {
                setSearchTerm('');
                setHighlightedId(id);
                resetView();

                setTimeout(() => {
                    const el = document.querySelector(`[data-member-id="${id}"]`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                }, 100);

                setTimeout(() => setHighlightedId(null), 3000);
            };

            const MemberCard = ({ member, role, onEdit, onAddChild, onAddSpouse }) => {
                const isAdmin = role === 'admin';
                const isFemale = member.gender === 'female';
                const isDragging = draggedId === member.id;
                const isDropTarget = dragOverId === member.id;

                return (
                    <div
                        data-member-id={member.id}
                        draggable={isAdmin}
                        onDragStart={(e) => handleDragStart(e, member.id)}
                        onDragEnd={handleDragEnd}
                        onDragOver={(e) => handleDragOver(e, member.id)}
                        onDragLeave={() => handleDragLeave(member.id)}
                        onDrop={() => handleDrop(member.id)}
                        className={`group relative p-3 rounded-xl border w-44 flex-shrink-0 shadow-sm transition-all
                            ${isFemale ? 'bg-rose-50 border-rose-200' : 'bg-indigo-50 border-indigo-200'}
                            ${highlightedId === member.id ? 'ring-4 ring-purple-500 scale-105 z-40' : 'hover:shadow-md'}
                            ${isDragging ? 'dragging-card' : ''}
                            ${isDropTarget ? 'drop-target' : ''}`}
                    >
                        {isAdmin && (
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-2 rounded-full border shadow-sm opacity-0 group-hover:opacity-100 cursor-grab" title="Sürükleyerek yerini değiştir">
                                <Icon name="drag" className="w-3 h-3 text-gray-400" />
                            </div>
                        )}

                        <div className="flex justify-between items-start mb-2">
                            {/* Profil resmi veya ikon */}
                            {member.photo ? (
                                <div
                                    className={`photo-zoom-wrap relative w-12 h-12 rounded-lg overflow-hidden border-2 ${isFemale ? 'border-rose-400' : 'border-indigo-400'} bg-white`}
                                    title={member.name}
                                >
                                    <img
                                        src={member.photo}
                                        alt={member.name}
                                        draggable={false}
                                        className="w-full h-full object-cover"
                                    />
                                </div>
                            ) : (
                                <div className={`p-1.5 rounded-lg text-white ${isFemale ? 'bg-rose-500' : 'bg-indigo-500'}`}>
                                    <Icon name="user" className="w-4 h-4" />
                                </div>
                            )}

                            {isAdmin && (
                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onClick={onEdit} className="p-1.5 bg-white rounded-lg border hover:text-purple-600 shadow-sm" title="Düzenle">
                                        <Icon name="edit" className="w-3 h-3" />
                                    </button>
                                    <button onClick={() => deleteMember(member.id)} className="p-1.5 bg-white rounded-lg border hover:text-red-600 shadow-sm" title="Sil">
                                        <Icon name="trash" className="w-3 h-3" />
                                    </button>
                                </div>
                            )}
                        </div>

                        <h4 className="font-bold text-gray-800 text-sm truncate pr-2">{member.name}</h4>
                        <div className="mt-1 flex flex-col items-start gap-1">
                            <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full ${member.is_alive === 'Evet' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'}`}>
                                {member.is_alive === 'Evet' ? 'HAYATTA' : 'VEFAT'}
                            </span>
                            {member.parents_info && (
                                <p className="text-[9px] text-gray-500 italic truncate w-full" title={member.parents_info}>
                                    Ailesi: {member.parents_info}
                                </p>
                            )}
                        </div>

                        {isAdmin && (
                            <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 flex gap-2 opacity-0 group-hover:opacity-100 transition-all z-50">
                                {!member.spouse_id && (
                                    <button onClick={onAddSpouse} className="p-2 bg-purple-500 text-white rounded-full shadow-lg hover:scale-110 hover:bg-purple-600" title="Eş Ekle">
                                        <Icon name="heart" className="w-4 h-4 fill-current" />
                                    </button>
                                )}
                                <button onClick={onAddChild} className="p-2 bg-indigo-500 text-white rounded-full shadow-lg hover:scale-110 hover:bg-indigo-600" title="Çocuk Ekle">
                                    <Icon name="baby" className="w-4 h-4" />
                                </button>
                            </div>
                        )}
                    </div>
                );
            };

            const FamilyNode = ({ memberId, processed = new Set() }) => {
                if (processed.has(memberId)) return null;
                const member = familyMembers.find(m => m.id === memberId);
                if (!member) return null;

                processed.add(memberId);

                const spouse = member.spouse_id ? familyMembers.find(f => f.id === member.spouse_id) : null;
                if (spouse) processed.add(spouse.id);

                const children = familyMembers
                    .filter(m => m.parent_id === member.id || (spouse && m.parent_id === spouse.id))
                    .sort((a, b) => (a.order || 0) - (b.order || 0));

                const coupleInner = (
                    <div className="flex items-center gap-2">
                        <MemberCard
                            member={member}
                            role={userRole}
                            onEdit={() => openModal('edit', member)}
                            onAddChild={() => openModal('add-child', member)}
                            onAddSpouse={() => openModal('add-spouse', member)}
                        />
                        {spouse && (
                            <React.Fragment>
                                <div className="w-10 link-spouse flex items-center justify-center">
                                    <span className="absolute inset-x-0 -top-2 flex justify-center">
                                        <span className="bg-white rounded-full p-0.5 border border-purple-200 shadow-sm">
                                            <Icon name="heart" className="w-3 h-3 text-purple-500 fill-current" />
                                        </span>
                                    </span>
                                </div>
                                <MemberCard
                                    member={spouse}
                                    role={userRole}
                                    onEdit={() => openModal('edit', spouse)}
                                    onAddChild={() => openModal('add-child', spouse)}
                                    onAddSpouse={() => openModal('add-spouse', spouse)}
                                />
                            </React.Fragment>
                        )}
                    </div>
                );

                return (
                    <div className="flex flex-col items-center">
                        {spouse ? (
                            <div className="couple-frame">{coupleInner}</div>
                        ) : (
                            coupleInner
                        )}

                        {children.length > 0 && (
                            <div className="flex flex-col items-center relative">
                                {/* Çiftten aşağı inen ana çizgi */}
                                <div className="link-vertical h-8"></div>

                                <div className="flex gap-12 relative">
                                    {/* Çocuklar arası yatay bağlayıcı */}
                                    {children.length > 1 && (
                                        <div
                                            className="link-horizontal absolute top-0 left-0 right-0"
                                            style={{ marginLeft: '5.5rem', marginRight: '5.5rem' }}
                                        ></div>
                                    )}
                                    {children.map(child => (
                                        <div key={child.id} className="relative pt-8 flex flex-col items-center">
                                            {/* Yatay çizgiden çocuğa inen kısa dikey çizgi */}
                                            <div className="link-vertical absolute top-0 left-1/2 -translate-x-1/2 h-8"></div>
                                            <FamilyNode memberId={child.id} processed={processed} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-[#1e1b4b] flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
                            <div className="bg-purple-600 p-10 text-center text-white">
                                <Icon name="tree" className="w-16 h-16 mx-auto mb-4" />
                                <h2 className="text-3xl font-bold uppercase tracking-tighter">Morkoç Ailesi</h2>
                                <p className="text-purple-200 text-xs mt-2 font-bold tracking-widest uppercase">Soyağacı Portalı</p>
                            </div>
                            <form onSubmit={handleLogin} className="p-8 space-y-5">
                                <select
                                    className="w-full p-4 rounded-xl border border-gray-200 font-bold text-gray-700 bg-gray-50 outline-none"
                                    value={loginData.roleSelection}
                                    onChange={e => setLoginData({ ...loginData, roleSelection: e.target.value })}
                                >
                                    <option value="visitor">Ziyaretçi (İzleme)</option>
                                    <option value="admin">Yönetici (Tam Yetki)</option>
                                </select>

                                {loginData.roleSelection === 'admin' && (
                                    <input
                                        type="password"
                                        placeholder="Şifre"
                                        required
                                        className="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-purple-500"
                                        onChange={e => setLoginData({ ...loginData, password: e.target.value })}
                                    />
                                )}

                                <button type="submit" className="w-full bg-purple-600 text-white font-bold py-4 rounded-xl uppercase hover:bg-purple-700 transition-all shadow-lg active:scale-95">
                                    Sisteme Giriş
                                </button>
                            </form>
                            {errorMessage && <p className="text-center pb-6 text-red-500 text-sm font-bold">{errorMessage}</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="h-16 bg-white border-b flex items-center justify-between px-3 sm:px-8 shadow-sm z-50 gap-2">
                        <div className="flex items-center gap-2 sm:gap-3 min-w-0">
                            <div className="bg-purple-600 p-2 rounded-lg text-white shadow flex-shrink-0">
                                <Icon name="tree" className="w-5 h-5" />
                            </div>
                            <div className="min-w-0">
                                <h1 className="font-bold text-xs sm:text-sm uppercase text-gray-800 leading-none truncate">Morkoç Ailesi</h1>
                                {userRole === 'visitor' && (
                                    <span className="text-[10px] text-purple-600 font-extrabold flex items-center gap-1 mt-1">
                                        <Icon name="eye" className="w-3 h-3" />
                                        <span className="hidden xs:inline">İZLEME MODU</span>
                                        <span className="xs:hidden">İZLEME</span>
                                    </span>
                                )}
                            </div>
                        </div>

                        <div className="flex items-center gap-2 sm:gap-4 flex-shrink-0">
                            <div className="relative">
                                <Icon name="search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                                <input
                                    type="text"
                                    placeholder="İsim ara..."
                                    className="pl-9 pr-3 py-2 sm:py-2.5 bg-gray-100 rounded-full text-sm outline-none w-32 sm:w-48 focus:w-44 sm:focus:w-64 transition-all"
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />

                                {searchSuggestions.length > 0 && (
                                    <div className="absolute top-12 right-0 w-64 bg-white border rounded-2xl shadow-2xl z-50 overflow-hidden">
                                        {searchSuggestions.map(m => (
                                            <button
                                                key={m.id}
                                                onClick={() => focusOnMember(m.id)}
                                                className="w-full p-3 text-left hover:bg-purple-50 flex items-center gap-3 border-b last:border-0"
                                            >
                                                <Icon name="user" className={`w-4 h-4 ${m.gender === 'male' ? 'text-indigo-500' : 'text-rose-500'}`} />
                                                <span className="font-bold text-sm text-gray-800 truncate">{m.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <button onClick={() => setIsAuthenticated(false)} className="p-2 text-gray-400 hover:text-red-500 transition-colors">
                                <Icon name="logout" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main
                        ref={viewportRef}
                        onWheel={handleViewportWheel}
                        onMouseDown={handleViewportMouseDown}
                        onMouseMove={handleViewportMouseMove}
                        onMouseUp={stopPanning}
                        onMouseLeave={stopPanning}
                        className={`pan-zoom-viewport flex-1 bg-white m-2 sm:m-4 rounded-2xl sm:rounded-[2.5rem] shadow-inner border border-purple-100 ${isPanning ? 'is-panning' : ''}`}
                    >
                        {familyMembers.length === 0 && !isLoading ? (
                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                <div className="bg-purple-50 p-12 rounded-[3rem] border border-purple-100 text-center max-w-sm mx-auto">
                                    <Icon name="tree" className="w-16 h-16 text-purple-300 mx-auto mb-6" />
                                    <h3 className="font-bold text-gray-800 uppercase text-xl">Soyağacı Boş</h3>
                                    {userRole === 'admin' ? (
                                        <button
                                            onClick={() => openModal('add-root')}
                                            className="mt-6 flex items-center justify-center gap-2 w-full bg-purple-600 text-white px-6 py-4 rounded-2xl font-bold uppercase hover:bg-purple-700 shadow-lg active:scale-95 transition-all"
                                        >
                                            <Icon name="plus" className="w-5 h-5" />
                                            İlk Atayı Ekle
                                        </button>
                                    ) : (
                                        <p className="text-sm text-gray-500 mt-4">Yönetici henüz kayıt eklememiş.</p>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div
                                ref={canvasRef}
                                className="pan-zoom-canvas"
                                style={{ transform: `translate(calc(-50% + ${pan.x}px), ${pan.y}px) scale(${zoom})` }}
                            >
                                <div className="flex flex-col items-center gap-24 py-10 px-10">
                                    {roots.map(root => (
                                        <FamilyNode key={root.id} memberId={root.id} />
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Zoom kontrolleri (her zaman ekran sağ alt) */}
                        <div className="zoom-controls flex flex-col gap-1.5 bg-white/95 backdrop-blur rounded-2xl shadow-xl border border-purple-100 p-1.5">
                            <button
                                onClick={zoomIn}
                                disabled={zoom >= ZOOM_MAX}
                                className="w-11 h-11 flex items-center justify-center rounded-xl bg-purple-50 hover:bg-purple-100 active:bg-purple-200 text-purple-700 font-bold text-2xl disabled:opacity-40"
                                title="Yakınlaştır"
                            >+</button>
                            <button
                                onClick={zoomOut}
                                disabled={zoom <= ZOOM_MIN}
                                className="w-11 h-11 flex items-center justify-center rounded-xl bg-purple-50 hover:bg-purple-100 active:bg-purple-200 text-purple-700 font-bold text-2xl disabled:opacity-40"
                                title="Uzaklaştır"
                            >−</button>
                            <button
                                onClick={resetView}
                                className="w-11 h-11 flex items-center justify-center rounded-xl bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-gray-600 text-[10px] font-bold"
                                title="Sıfırla"
                            >1:1</button>
                            <div className="text-center text-[10px] text-gray-500 font-bold pt-1 border-t border-gray-100">
                                {Math.round(zoom * 100)}%
                            </div>
                        </div>
                    </main>

                    {modalMode && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-3 sm:p-4 backdrop-blur-sm overflow-y-auto">
                            <div className="bg-white rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden my-auto">
                                <div className="p-6 border-b flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold uppercase text-gray-800">
                                        {modalMode === 'edit'
                                            ? 'Düzenle'
                                            : modalMode === 'add-spouse'
                                            ? 'Eş Ekle'
                                            : modalMode === 'add-child'
                                            ? 'Çocuk Ekle'
                                            : 'Ata Ekle'}
                                    </h3>
                                    <button onClick={closeModal} className="text-gray-400 hover:text-red-500">
                                        <Icon name="x" className="w-5 h-5" />
                                    </button>
                                </div>

                                <form onSubmit={saveMember} className="p-6 space-y-4">
                                    <div className="flex flex-col items-center mb-4">
                                        <div
                                            onClick={() => fileInputRef.current?.click()}
                                            className="w-20 h-20 rounded-full bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer overflow-hidden hover:border-purple-500 transition-colors"
                                        >
                                            {formData.photo ? (
                                                <img src={formData.photo} className="w-full h-full object-cover" alt="profil" />
                                            ) : (
                                                <Icon name="camera" className="w-6 h-6 text-gray-400" />
                                            )}
                                        </div>
                                        <input type="file" ref={fileInputRef} onChange={handlePhotoChange} accept="image/*" className="hidden" />
                                    </div>

                                    <input
                                        placeholder="Adı Soyadı"
                                        required
                                        className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 font-bold text-gray-800"
                                        value={formData.name}
                                        onChange={e => setFormData({ ...formData, name: e.target.value })}
                                    />

                                    <div className="grid grid-cols-2 gap-4">
                                        <select
                                            className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 bg-white"
                                            value={formData.is_alive}
                                            onChange={e => setFormData({ ...formData, is_alive: e.target.value })}
                                        >
                                            <option value="Evet">Hayatta</option>
                                            <option value="Hayır">Vefat</option>
                                        </select>
                                        <select
                                            className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 bg-white"
                                            value={formData.gender}
                                            onChange={e => setFormData({
                                                ...formData,
                                                gender: e.target.value,
                                                parents_info: e.target.value === 'female' ? formData.parents_info : ''
                                            })}
                                        >
                                            <option value="male">Erkek</option>
                                            <option value="female">Kadın</option>
                                        </select>
                                    </div>

                                    {formData.gender === 'female' && (
                                        <input
                                            placeholder="Kızlık Soyadı / Ailesi"
                                            className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500"
                                            value={formData.parents_info}
                                            onChange={e => setFormData({ ...formData, parents_info: e.target.value })}
                                        />
                                    )}

                                    <button
                                        type="submit"
                                        disabled={isSaving}
                                        className="w-full bg-purple-600 text-white font-bold p-4 rounded-xl uppercase hover:bg-purple-700 shadow-lg mt-2 transition-all disabled:opacity-50"
                                    >
                                        {isSaving ? "Kaydediliyor..." : "Kaydet"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
